apiVersion: 1

datasources:
  - name: ClickHouse
    type: vertamedia-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    jsonData:
      # The plugin uses dataSourceUrl internally; url above is for Grafana core
      dataSourceUrl: http://clickhouse:8123
      oauthPassThru: true
    version: 1
    editable: false
